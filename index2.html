<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#080c0a;--surface:#111916;--elevated:#192420;--border:#2a3a33;
  --primary:#10b981;--primary-light:#34d399;--primary-dim:#065f46;
  --accent:#f59e0b;--accent-dim:#92400e;--danger:#ef4444;--danger-dim:#7f1d1d;
  --text:#e2e8e4;--text-sec:#8a9e92;--text-muted:#5a6e62;
}
*{margin:0;padding:0;box-sizing:border-box;scrollbar-width:thin;scrollbar-color:var(--primary-dim) var(--surface)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--primary-dim);border-radius:3px}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;line-height:1.7}
h1,h2,h3,h4,h5{font-family:'Playfair Display',serif;line-height:1.25}
a{color:var(--primary-light);text-decoration:none;transition:.2s}
a:hover{color:var(--primary)}

.sidebar{position:fixed;left:0;top:0;bottom:0;width:290px;background:var(--surface);border-right:1px solid var(--border);z-index:100;display:flex;flex-direction:column;transition:transform .35s cubic-bezier(.4,0,.2,1)}
.sidebar-logo{padding:24px 20px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo h2{font-size:1.15rem;color:var(--primary-light);letter-spacing:-.02em}
.sidebar-logo p{font-size:.72rem;color:var(--text-muted);margin-top:2px;letter-spacing:.06em;text-transform:uppercase}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 0}
.nav-group-label{padding:10px 20px 4px;font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text-muted);font-weight:700}
.nav-item{display:flex;align-items:center;gap:12px;padding:9px 20px;cursor:pointer;transition:.2s;border-left:3px solid transparent;font-size:.82rem;color:var(--text-sec);position:relative}
.nav-item:hover{background:rgba(16,185,129,.06);color:var(--text)}
.nav-item.active{background:rgba(16,185,129,.1);color:var(--primary-light);border-left-color:var(--primary)}
.nav-item .nav-num{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.65rem;flex-shrink:0;font-weight:700;background:var(--elevated);border:1px solid var(--border);color:var(--text-muted);transition:.2s;font-family:'DM Sans',sans-serif}
.nav-item.active .nav-num{background:var(--primary-dim);border-color:var(--primary);color:var(--primary-light)}
.nav-item .nav-title{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item .nav-badge{margin-left:auto;font-size:.6rem;padding:2px 7px;border-radius:10px;background:var(--elevated);color:var(--text-muted);font-weight:600}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border);font-size:.7rem;color:var(--text-muted)}

.main{margin-left:290px;min-height:100vh;position:relative}
.main-header{position:sticky;top:0;z-index:50;background:rgba(8,12,10,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;gap:16px}
.main-header .breadcrumb{font-size:.8rem;color:var(--text-muted)}
.main-header .breadcrumb span{color:var(--primary-light)}
.search-btn{margin-left:auto;width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--elevated);color:var(--text-sec);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;font-size:.85rem}
.search-btn:hover{border-color:var(--primary);color:var(--primary-light)}
.hamburger{display:none;width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--elevated);color:var(--text-sec);align-items:center;justify-content:center;cursor:pointer;font-size:1rem}
.content-area{padding:32px;max-width:960px;margin:0 auto}

.hero{position:relative;min-height:70vh;display:flex;align-items:center;overflow:hidden}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-bg canvas{width:100%;height:100%}
.hero-gradient{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(16,185,129,.08) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(245,158,11,.04) 0%,transparent 50%)}
.hero-content{position:relative;z-index:2;padding:40px 0}
.hero-tag{display:inline-flex;align-items:center;gap:8px;font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:var(--primary-light);background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);padding:6px 16px;border-radius:20px;margin-bottom:24px;font-weight:600}
.hero h1{font-size:clamp(2.5rem,5vw,4rem);font-weight:900;color:var(--text);margin-bottom:20px;letter-spacing:-.03em}
.hero h1 em{font-style:normal;color:var(--primary-light)}
.hero p{font-size:1.1rem;color:var(--text-sec);max-width:580px;line-height:1.8;margin-bottom:32px}
.hero-stats{display:flex;gap:24px;flex-wrap:wrap}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 24px;min-width:140px}
.stat-card .stat-num{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;color:var(--primary-light)}
.stat-card .stat-label{font-size:.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}

.topic-header{margin-bottom:32px}
.topic-header h2{font-size:2rem;font-weight:700;color:var(--text);margin-bottom:8px}
.topic-header p{color:var(--text-sec);font-size:.95rem;max-width:640px}
.topic-meta{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap}
.meta-tag{font-size:.7rem;padding:4px 12px;border-radius:6px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.meta-tag.urgent{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.meta-tag.clinic{background:rgba(16,185,129,.1);color:var(--primary-light);border:1px solid rgba(16,185,129,.2)}
.meta-tag.bio{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
.meta-tag.td{background:rgba(34,211,238,.1);color:#67e8f9;border:1px solid rgba(34,211,238,.2)}

.accordion{margin-bottom:12px;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface);transition:.2s}
.accordion:hover{border-color:rgba(16,185,129,.3)}
.accordion.open{border-color:rgba(16,185,129,.3)}
.accordion-head{display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer;transition:.2s;user-select:none}
.accordion-head:hover{background:rgba(16,185,129,.04)}
.accordion-head .acc-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.75rem;background:var(--elevated);border:1px solid var(--border);color:var(--primary-light);flex-shrink:0}
.accordion-head h3{font-size:.95rem;font-weight:600;flex:1;font-family:'DM Sans',sans-serif}
.accordion-head .acc-chevron{color:var(--text-muted);font-size:.7rem;transition:transform .3s}
.accordion.open .acc-chevron{transform:rotate(180deg)}
.accordion-body{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1)}
.accordion.open .accordion-body{max-height:5000px}
.accordion-content{padding:0 20px 20px}

.content-text{font-size:.9rem;color:var(--text-sec);line-height:1.85}
.content-text strong{color:var(--text);font-weight:600}
.content-text ul{padding-left:20px;margin:8px 0}
.content-text li{margin-bottom:4px}
.content-text li::marker{color:var(--primary)}

.callout{border-radius:10px;padding:16px 18px;margin:14px 0;font-size:.85rem;line-height:1.7;display:flex;gap:12px;align-items:flex-start}
.callout .callout-icon{flex-shrink:0;width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.7rem;margin-top:2px}
.callout.info{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.15);color:var(--primary-light)}
.callout.info .callout-icon{background:var(--primary-dim);color:var(--primary-light)}
.callout.warn{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.15);color:#fbbf24}
.callout.warn .callout-icon{background:var(--accent-dim);color:#fbbf24}
.callout.danger{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);color:#f87171}
.callout.danger .callout-icon{background:var(--danger-dim);color:#f87171}
.callout.neutral{background:var(--elevated);border:1px solid var(--border);color:var(--text-sec)}
.callout.neutral .callout-icon{background:var(--border);color:var(--text-muted)}

.clinical-table{width:100%;border-collapse:separate;border-spacing:0;margin:14px 0;font-size:.82rem;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.clinical-table thead{background:var(--elevated)}
.clinical-table th{padding:10px 14px;text-align:left;font-weight:600;color:var(--primary-light);font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)}
.clinical-table td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text-sec);vertical-align:top}
.clinical-table tr:last-child td{border-bottom:none}
.clinical-table tr:hover td{background:rgba(16,185,129,.03)}

.key-point{display:inline-flex;align-items:center;gap:6px;font-size:.8rem;color:var(--primary-light);font-weight:600;margin:4px 4px 4px 0;padding:3px 10px;background:rgba(16,185,129,.08);border-radius:6px;border:1px solid rgba(16,185,129,.15)}
.sub-title{font-size:1rem;font-weight:700;color:var(--text);margin:16px 0 8px;font-family:'Playfair Display',serif}
.sub-sub-title{font-size:.88rem;font-weight:600;color:var(--text);margin:12px 0 6px;padding-left:10px;border-left:2px solid var(--primary)}

.search-overlay{position:fixed;inset:0;z-index:200;background:rgba(8,12,10,.85);backdrop-filter:blur(8px);display:none;align-items:flex-start;justify-content:center;padding-top:10vh}
.search-overlay.show{display:flex}
.search-box{width:560px;max-width:90vw;background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.search-input-wrap{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border)}
.search-input-wrap i{color:var(--text-muted);font-size:1rem}
.search-input-wrap input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:1rem;font-family:'DM Sans',sans-serif}
.search-input-wrap input::placeholder{color:var(--text-muted)}
.search-input-wrap kbd{font-size:.65rem;padding:2px 8px;border-radius:4px;background:var(--elevated);border:1px solid var(--border);color:var(--text-muted);font-family:'DM Sans',sans-serif}
.search-results{max-height:50vh;overflow-y:auto;padding:8px}
.search-result-item{padding:10px 14px;border-radius:8px;cursor:pointer;transition:.15s}
.search-result-item:hover{background:rgba(16,185,129,.06)}
.search-result-item .sr-topic{font-size:.65rem;color:var(--primary-light);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.search-result-item .sr-title{font-size:.88rem;color:var(--text);font-weight:500;margin:2px 0}
.search-result-item .sr-excerpt{font-size:.78rem;color:var(--text-muted);line-height:1.5}
.search-empty{padding:40px 20px;text-align:center;color:var(--text-muted);font-size:.88rem}

.quiz-card{background:var(--elevated);border:1px solid var(--border);border-radius:12px;padding:20px;margin:16px 0}
.quiz-q{font-size:.9rem;font-weight:600;color:var(--text);margin-bottom:14px}
.quiz-option{display:block;width:100%;text-align:left;padding:10px 14px;margin-bottom:6px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text-sec);font-size:.82rem;cursor:pointer;transition:.2s;font-family:'DM Sans',sans-serif}
.quiz-option:hover{border-color:var(--primary);color:var(--text)}
.quiz-option.correct{border-color:var(--primary);background:rgba(16,185,129,.12);color:var(--primary-light)}
.quiz-option.wrong{border-color:var(--danger);background:rgba(239,68,68,.08);color:#f87171}
.quiz-option:disabled{cursor:default;opacity:.7}
.quiz-feedback{margin-top:10px;font-size:.82rem;padding:8px 12px;border-radius:6px;display:none}
.quiz-feedback.show{display:block}
.quiz-feedback.correct-fb{background:rgba(16,185,129,.1);color:var(--primary-light)}
.quiz-feedback.wrong-fb{background:rgba(239,68,68,.1);color:#f87171}

.sidebar-overlay{position:fixed;inset:0;z-index:99;background:rgba(0,0,0,.5);display:none}
.sidebar-overlay.show{display:block}

@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeInUp .5s ease both}
.fade-in-d1{animation:fadeInUp .5s ease .1s both}
.fade-in-d2{animation:fadeInUp .5s ease .2s both}
.fade-in-d3{animation:fadeInUp .5s ease .3s both}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .hamburger{display:flex}
  .content-area{padding:20px 16px}
  .hero h1{font-size:2rem}
  .hero-stats{gap:12px}
  .stat-card{min-width:110px;padding:12px 16px}
  .clinical-table{font-size:.75rem}
  .clinical-table th,.clinical-table td{padding:8px 10px}
}
@media(prefers-reduced-motion:reduce){*{animation-duration:0s!important;transition-duration:0s!important}}
</style>
</head>

<script>
/* ===== DONNEES — ORDRE 1-8 + TD SELON LES FICHIERS ORIGINAUX ===== */
const TOPICS = [
/* 1 */ {
  id:"signes-digestifs", num:"01", title:"Signes Fonctionnels Digestifs", icon:"fa-notes-medical",
  color:"#06b6d4", tags:[{t:"Interrogatoire",c:"clinic"},{t:"Syndromes",c:"bio"}],
  desc:"Anorexie, dysphagie, vomissements, troubles du transit, douleurs abdominales, hemorragies digestives.",
  sections:[
  {title:"Troubles de l'Appetit et Dysphagie",icon:"fa-utensils",
   content:`<div class="sub-title">Anorexie</div>
<p class="content-text">Diminution ou perte de l'appetit. Globale (tous aliments) ou elective (certains aliments).</p>
<ul class="content-text"><li><strong>Etiologies :</strong> digestive (ulcere G-D, cancer digestif), infectieuse (tuberculose), psychique (anorexie mentale)</li></ul>
<div class="sub-title">Polyphagie</div>
<p class="content-text">Augmentation de l'appetit. Diabete, obesite, troubles psychiatriques.</p>
<div class="sub-title">Dysphagie</div>
<p class="content-text">Sensation de blocage lors du passage des aliments dans l'oesophage.</p>
<div class="sub-sub-title">Caracteristiques semio-logiques</div>
<table class="clinical-table">
<thead><tr><th>Caractere</th><th>Interpretation</th></tr></thead>
<tbody>
<tr><td>Debut recent</td><td>Trouble mecanique</td></tr>
<tr><td>Debut ancien</td><td>Trouble fonctionnel</td></tr>
<tr><td>Progressive (solides → semi-liquides → liquides → aphagie)</td><td>Organique (cancer oesophage)</td></tr>
<tr><td>Intermittente</td><td>Functionnel</td></tr>
<tr><td>Cervicale (avec toux)</td><td>Localisation haute</td></tr>
<tr><td>Thoracique (retrosternale)</td><td>Localisation moyenne</td></tr>
<tr><td>Abdominale haute (retro-xiphoïdienne)</td><td>Localisation basse</td></tr>
</tbody></table>
<div class="sub-sub-title">Etiologies</div>
<ul class="content-text">
<li><strong>Organiques :</strong> stenose tumorale (cancer oesophage/cardia), stenose non tumorale (peptique, radique, caustique), oesophagite, anomalies anatomiques (diverticules, anneaux)</li>
<li><strong>Fonctionnelles :</strong> achalasie, spasme diffus, troubles moteurs secondaires (diabete, sclerodermie)</li>
</ul>`},

{title:"Vomissements",icon:"fa-person-vomit",
   content:`<p class="content-text">Rejet brutal par la bouche du contenu de l'estomac.</p>
<div class="sub-sub-title">Caracteres semio-logiques</div>
<table class="clinical-table">
<thead><tr><th>Caractere</th><th>Orientation</th></tr></thead>
<tbody>
<tr><td>Matinal a jeun</td><td>Grossesse, ethylisme</td></tr>
<tr><td>Post-prandial precoce</td><td>Trouble fonctionnel</td></tr>
<tr><td>Post-prandial tardif</td><td>Cause organique</td></tr>
<tr><td>En jet</td><td>HIC (tumeur cerebrale), syndrome meninge</td></tr>
<tr><td>Fecaloides</td><td>Occlusion basse</td></tr>
<tr><td>Bilieux</td><td>Obstruction sous-pylorique</td></tr>
<tr><td>Hematiques</td><td>Ulcere G-D, rupture varices, Mallory-Weiss</td></tr>
</tbody></table>
<div class="sub-sub-title">Etiologies</div>
<ul class="content-text">
<li><strong>Digestives :</strong> gastroenterite, stenose pylore, cholécystite aigue, pancreatite aigue, hepatite aigue, infarctus mesenterique, occlusion, peritonite</li>
<li><strong>Extra-digestives :</strong> neurologique (HIC, meningite), gynecologique (grossesse, torsion kyste, GEU), cardio-vasculaire (IDM), endocrinienne (insuffisance surrenale aigue, cetose diabetique), ORL (vertige), medicamenteuse, psychique</li>
</ul>`},

{title:"Troubles du Transit",icon:"fa-toilet",
   content:`<div class="sub-title">Diarrhee</div>
<p class="content-text">Acceleration du transit : selles trop liquides, trop frequentes ou trop volumineuses.</p>
<div class="sub-sub-title">Mecanismes</div>
<ul class="content-text">
<li><strong>Hyperkinesie</strong> : trouble de la motilite</li>
<li><strong>Hypersécretion</strong> : trouble des secretions digestives</li>
<li><strong>Malabsorption</strong> : lesion muqueuse intestinale (selles avec steatorrhée : molles, volumineuses, palees, luisantes, odeur fétide)</li>
<li><strong>Maldigestion</strong> : insuffisance enzymatique ou anomalie flore microbienne</li>
</ul>
<div class="sub-sub-title">Diarrhees aigues</div>
<ul class="content-text">
<li><strong>Bacteriennes :</strong> toxi-infection alimentaire (collective), fievre typhoide (diarrhee ocre « jus de melon » au 2e septenaire), cholera (diarrhee riziforme + deshydratation majeure)</li>
<li>Virales, mycosiques, parasitaires</li>
</ul>
<div class="sub-sub-title">Diarrhees chroniques</div>
<table class="clinical-table">
<thead><tr><th>Type</th><th>Caracteristiques</th><th>Etiologies</th></tr></thead>
<tbody>
<tr><td>Colique</td><td>Matinale, imperieuse, selle moulée puis selles molles/liquides, coliques, alternance constipation</td><td>Cancer colo-rectal, diverticulose, amibiase</td></tr>
<tr><td>Grelique</td><td>Malabsorption, steatorrhée, sans douleur, anorexie, amaigrissement</td><td>Ictere par retention, insuffisance pancreatique exocrine, Crohn</td></tr>
<tr><td>Motrice</td><td>Liquide, post-prandiale immediate/precoce (30min-1h), imperieuse, fragments alimentaires</td><td>Diabete, hyperthyroïdie, tumeur neuro-endocrine, psychique</td></tr>
</tbody></table>
<div class="sub-title">Constipation</div>
<p class="content-text">Transit prolonge : &lt; 3 selles/semaine et/ou difficulté pour exonérer.</p>
<ul class="content-text">
<li><strong>Anomalie de progression</strong> : stase colique. TR : rectum vide</li>
<li><strong>Dyschésie pelvi-rectale</strong> : stagnation sigmoide/rectum. TR : rectum plein</li>
<li><strong>Causes organiques :</strong> cancer colon/rectum, colites</li>
<li><strong>Causes fonctionnelles :</strong> transitoires (maladie aigue, grossesse, chirurgie) ou chroniques (erreur dietetique, hypothyroïdie, medicaments)</li>
<li><strong>Fausse diarrhee :</strong> selles liquides avec fragments de selles dures → evoquer cancer colique</li>
</ul>`},

{title:"Douleurs Abdominales",icon:"fa-bolt",
   content:`<p class="content-text">L'interrogatoire precise : siege (9 quadrants), irradiations, terrain/ATCD, installation (brutale/progressive), intensite, type, evolution (rythmicite, paroxystique/permanente), facteurs declenchants/sedatifs, signes accompagnateurs.</p>
<div class="sub-sub-title">Types de douleurs</div>
<table class="clinical-table">
<thead><tr><th>Type</th><th>Description</th><th>Exemple</th></tr></thead>
<tbody>
<tr><td>Crampe</td><td>Torsion profonde, calmee par alimentation (« faim douloureuse »)</td><td>Ulcere G-D</td></tr>
<tr><td>Brulure</td><td>« Aigreurs », accompagnee de pyrosis</td><td>Gastrite</td></tr>
<tr><td>Colique</td><td>Ondes croissantes/decroissantes, impression de migration</td><td>Intestin, voies biliaires</td></tr>
<tr><td>Coup de poignard</td><td>Dechirante, inhibe respiration profonde</td><td>Perforation ulcere</td></tr>
<tr><td>Pesanteur</td><td>Lourdeur, faux retard evacuation gastrique</td><td>—</td></tr>
<tr><td>Battante</td><td>Epigastrique, battements aorte</td><td>Anevrisme aorte</td></tr>
</tbody></table>
<div class="sub-title">Etiologies principales</div>
<div class="sub-sub-title">Douleurs gastriques</div>
<ul class="content-text">
<li><strong>Ulcere G-D :</strong> crampe, epigastrique, irradiation en barre/dorsale, post-prandiale tardive (estomac : 1h30, duodenal : 4h), periodique, calmee par aliments/repos/pansements. Complication : perforation (coup de poignard + contracture + disparition matite hepatique + cri Douglas)</li>
<li><strong>Gastrite :</strong> brulure epigastrique, pyrosis, post-prandiale precoce, non periodique</li>
<li><strong>Cancer gastrique :</strong> atypique, non rythmee, non periodique</li>
</ul>
<div class="sub-sub-title">Douleur pancreatique (pancreatite aigue)</div>
<ul class="content-text"><li>Crampe debut brutal, intense, transfixiante. Epigastrique → sous-costale G, lombo-thoracique, scapulaire G. Prolongee. Calmee position penchee en avant. Vomissements, fievre, choc</li></ul>
<div class="sub-sub-title">Douleur biliaire (colique hepatique)</div>
<ul class="content-text"><li>Paroxystique, debut brutal, tres intense, inhibition respiratoire (« colique pathetique »). HCD → omoplate D + epaule D (« douleur en bretelle »). Declenchee par repas gras. Murphy positif</li></ul>
<div class="sub-sub-title">Douleur peritoneale</div>
<ul class="content-text"><li>Permanente, localisee puis diffusee, augmentée par toux/eternuement/palpation/defecation. Contracture ABD generalisee + cri Douglas</li></ul>
<div class="sub-sub-title">Douleurs rapportees (cause extra-abdominale)</div>
<ul class="content-text"><li>Thoracique (IDM, pneumonie, epanchement), genitale, vertebrale (radiculaire), metabolique (cetose), neurologique (epilepsie), psychique</li></ul>`},

{title:"Hemorragies Digestives",icon:"fa-droplet",
   content:`<div class="sub-title">Definition</div>
<ul class="content-text">
<li><strong>Hematémèse :</strong> rejet par bouche de sang rouge/noirâtre, non spumeux, melange caillots/debris alimentaires → lesion digestive haute</li>
<li><strong>Méléna :</strong> selles noires, sang digéré, odeur fade/nauséabonde → origine haute (isolee) ou basse (associee hematémèse)</li>
<li><strong>Rectorragie :</strong> sang rouge pur, melange selle, ou arrosant la selle → lesion basse (exceptionnellement haute massive)</li>
</ul>
<div class="sub-title">Critères de gravite</div>
<div class="callout danger"><div class="callout-icon"><i class="fas fa-heart-pulse"></i></div><div><strong>Signes de choc :</strong> hypotension, tachycardie, marbrures, froideur extremites, allongement temps de recoloration, malaise, douleur thoracique, paleur intense, polypnee, troubles conscience. <br><em>La quantite de sang est souvent surestimee par le patient.</em></div></div>
<div class="sub-title">Etiologies</div>
<table class="clinical-table">
<thead><tr><th>Hemorragie haute</th><th>Hemorragie basse</th></tr></thead>
<tbody>
<tr><td>Ulcere gastro-duodenal</td><td>Diverticulose colique</td></tr>
<tr><td>Rupture varices oesophagiennes (cirrhose)</td><td>Cancer colo-rectal</td></tr>
<tr><td>Syndrome de Mallory-Weiss</td><td>Angiodysplasies</td></tr>
<tr><td>Erosions gastriques (AINS)</td><td>Hemorroides</td></tr>
<tr><td>Cancer gastrique</td><td>Colite ischémique, MICI</td></tr>
</tbody></table>
<div class="sub-title">Explorations</div>
<ul class="content-text">
<li><strong>Endoscopie digestive haute :</strong> 1ere intention (hematémèse, méléna, rectorragie massive)</li>
<li><strong>Endoscopie basse :</strong> 1ere intention (rectorragie non massive), 2e intention si haute normale</li>
<li>Video-capsule du grele, angio-TDM, arteriographie</li>
</ul>`},

{title:"Principaux Syndromes Digestifs",icon:"fa-layer-group",
   content:`<table class="clinical-table">
<thead><tr><th>Syndrome</th><th>Signes</th><th>Etiologies</th></tr></thead>
<tbody>
<tr><td>Dyspeptique</td><td>Epigastralgie, plenitude post-prandiale, ballonnement, satiete precoce</td><td>UGD, gastrite, cancer gastrique, dyspepsie fonctionnelle</td></tr>
<tr><td>Reflux</td><td>Pyrosis, regurgitation, syndrome postural</td><td>RGO, hernie hiatale, obesite, grossesse</td></tr>
<tr><td>Dysphagique</td><td>Dysphagie, odynophagie</td><td>Stenose oesophagienne, cancer, compression, troubles moteurs</td></tr>
<tr><td>Diarrheique</td><td>> 3 selles liquides/jour</td><td>Infectieuse, inflammatoire (Crohn), medicamenteuse</td></tr>
<tr><td>Constipation</td><td>&lt; 3 selles/semaine, dures, effort de poussee</td><td>Fonctionnelle, metabolique, medicamenteuse, tumeur colique</td></tr>
<tr><td>Dysenterique</td><td>Selles glairo-sanglantes, epreinte, tenesme</td><td>RCH, infection parasitaire</td></tr>
<tr><td>Hemorragique</td><td>Hematémèse, méléna, rectorragie</td><td>Ulcere, varices, cancer</td></tr>
</tbody></table>
<div class="callout info"><div class="callout-icon"><i class="fas fa-check-circle"></i></div><div><strong>Points cles :</strong> Les signes fonctionnels digestifs sont frequents et peu specifiques. Leur analyse repose sur un interrogatoire precis et systematise. Toujours eliminer une cause organique, rechercher les signes de gravite, orienter les examens par la clinique.</div></div>`}
]},

/* 2 */ {
  id:"hepatomegalie", num:"02", title:"Les Hepatomegalies", icon:"fa-shield-virus",
  color:"#16a34a", tags:[{t:"Examen clinique",c:"clinic"},{t:"Imagerie",c:"bio"}],
  desc:"Augmentation du volume du foie. Diagnostic positif, etiologique et differentiel.",
  sections:[
  {title:"Examen Clinique du Foie",icon:"fa-hand",
   content:`<div class="sub-title">Percussion</div>
<p class="content-text">Delimite le bord superieur du foie. Matite hepatique : courbe convexe en haut, base appendice xyphoïde, 5e EIC droit ligne medio-claviculaire, 7e EIC ligne axillaire, 11e vertebre dorsale.</p>
<div class="sub-title">Palpation — 3 methodes</div>
<table class="clinical-table">
<thead><tr><th>Methode</th><th>Position examinateur</th><th>Technique</th></tr></thead>
<tbody>
<tr><td>Chauffard</td><td>A droite du malade</td><td>Main G en lombaire D, main D a plat doigts vers haut obliques, inspiration profonde</td></tr>
<tr><td>Gilbert</td><td>Face au malade</td><td>2 mains a plat doigts vers haut, bord cubital G vers thorax</td></tr>
<tr><td>Mathieu</td><td>A la tete du malade</td><td>Doigts en crochet depassant rebord costal, inspiration</td></tr>
</tbody></table>
<div class="sub-title">Fleche hepatique</div>
<p class="content-text">Distance bord superieur - bord inferieur sur ligne medio-claviculaire. <strong>Normale : 12 cm.</strong> Bord inferieur normal : regulier, consistance elastique, surface lisse, mousse, indolore, mobile avec respiration.</p>`},

{title:"Diagnostic Positif et Etiologique",icon:"fa-magnifying-glass-chart",
   content:`<div class="sub-title">Diagnostic positif</div>
<ul class="content-text">
<li><strong>HPMG diffuse :</strong> fleche > 12 cm, tuméfaction HCD + epigastre, mobile avec respiration, bord inferieur oblique en haut et en dedans</li>
<li><strong>HPMG localisee :</strong> a developpement abdominal (masse tumorale HCD/epigastre) ou thoracique (matite anormalement haute, surélévation coupole diaphragmatique D)</li>
<li>Diagnostic difficile chez l'obèse et en cas d'ascite</li>
</ul>
<div class="sub-title">Physiopathologie — 4 mecanismes</div>
<table class="clinical-table">
<thead><tr><th>Mecanisme</th><th>Exemples</th></tr></thead>
<tbody>
<tr><td>Surcharge</td><td>Stéatose (triglycerides), hemochromatose (fer), maladie de Wilson (cuivre)</td></tr>
<tr><td>Congestion vasculaire</td><td>Insuffisance cardiaque D, syndrome de Budd-Chiari</td></tr>
<tr><td>Inflammation</td><td>Hepatite infectieuse, medicamenteuse, auto-immune</td></tr>
<tr><td>Infiltration</td><td>Tumorale (CHC, metastases), amylose, granulomatose</td></tr>
</tbody></table>
<div class="sub-title">Examens complementaires</div>
<ul class="content-text">
<li><strong>Biologie :</strong> NFS, plaquettes, TP, bilirubine, transaminases, PAL, GGT, EPP, uree, creatinine, glycemie, cholesterol, TG, serologies HBV/HCV</li>
<li><strong>Echographie :</strong> taille, forme, echogenicite, homogeneite, nodules, voies biliaires, ascite, rate</li>
<li><strong>Echo-doppler hepatique :</strong> veines sus-hepatiques, VCI, veine porte</li>
<li><strong>TDM / IRM :</strong> 2e intention</li>
<li><strong>Biopsie hepatique</strong></li>
</ul>`},

{title:"Diagnostics Differentiels",icon:"fa-arrows-left-right",
   content:`<table class="clinical-table">
<thead><tr><th>HPMG</th><th>DD</th><th>Cle du diagnostic</th></tr></thead>
<tbody>
<tr><td>Diffuse</td><td>Foie ptose</td><td>Fleche hepatique NORMALE, bord palpable sensible</td></tr>
<tr><td>Diffuse</td><td>Foie luxé</td><td>Refoule vers le bas par processus thoracique (epanchement pleural)</td></tr>
<tr><td>Diffuse</td><td>Lobe de Riedel</td><td>Languette dans flanc D en continuite avec le foie</td></tr>
<tr><td>Localisee abdo</td><td>Tumeur parietale</td><td>—</td></tr>
<tr><td>Lobe droit</td><td>Grosse vesicule</td><td>Bord inferieur arrondi et renitent</td></tr>
<tr><td>Lobe droit</td><td>Gros rein G</td><td>Contact lombaire, signes urinaires</td></tr>
<tr><td>Lobe droit</td><td>Tumeur angle colique D</td><td>Non mobile, troubles transit</td></tr>
<tr><td>Lobe gauche</td><td>Tumeur gastrique</td><td>—</td></tr>
<tr><td>Lobe gauche</td><td>Splenomegalie</td><td>Bord antérieur crenele</td></tr>
<tr><td>Thoracique</td><td>Pleurésie diaphragmatique</td><td>Clinique pleurale, ponction pleurale</td></tr>
</tbody></table>`}
]},

/* 3 */ {
  id:"examen-digestif", num:"03", title:"Examen Physique Appareil Digestif", icon:"fa-user-doctor",
  color:"#f97316", tags:[{t:"Examen clinique",c:"clinic"},{t:"Technique",c:"clinic"}],
  desc:"Inspection, palpation, percussion, auscultation de l'abdomen. Examen de la bouche et toucher rectal.",
  sections:[
  {title:"Examen de la Bouche",icon:"fa-teeth",
   content:`<div class="sub-sub-title">Denture</div>
<p class="content-text">Adulte : 32 dents. Enfant : 20 dents de lait. Etablir la formule dentaire, preciser caries, etat des gencives (ulcerations, gingivite, gingivorragies).</p>
<div class="sub-sub-title">Langue</div>
<table class="clinical-table">
<thead><tr><th>Aspect</th><th>Signification</th></tr></thead>
<tbody>
<tr><td>Seche, rotie</td><td>Deshydratation</td></tr>
<tr><td>Lisse, depapillee (glossite)</td><td>Carence facteur antipernicieux (B12, B9)</td></tr>
<tr><td>Lisse, luisante, rouge carmin</td><td>Cirrhose</td></tr>
<tr><td>Blanche, saburrale</td><td>Maladies infectieuses</td></tr>
<tr><td>Epaisse, augmentee (macroglossie)</td><td>Hypothyroïdie, amylose</td></tr>
<tr><td>Turgescente, empreintes dentaires</td><td>Hyperhydratation intracellulaire</td></tr>
</tbody></table>
<div class="sub-sub-title">Muqueuse buccale</div>
<ul class="content-text">
<li>Seche : deshydratation intracellulaire</li>
<li>Rouge avec points blanchatres : <strong>signe de Koplick</strong> (rougeole)</li>
<li>Taches bleu ardoise : maladie d'Addison</li>
<li>Face inferieure langue : rechercher <strong>sub-ictère</strong></li>
</ul>`},

{title:"Inspection de l'Abdomen",icon:"fa-eye",
   content:`<p class="content-text">Patient debout puis decubitus, declabille.</p>
<ul class="content-text">
<li>Observer la <strong>respiration abdominale</strong>, les mouvements peristaltiques, les battements aortiques</li>
<li>Rechercher une <strong>voussure</strong> (masse intra-abdominale)</li>
<li>Examiner les <strong>veines superficielles</strong> : circulation veineuse collaterale (CVC)</li>
<li>Inventaire des <strong>cicatrices</strong> : correspondance avec interventions chirurgicales</li>
</ul>
<div class="sub-sub-title">Anomalies a rechercher</div>
<ul class="content-text">
<li><strong>Angiomes stellaires :</strong> signe d'insuffisance hepatocellulaire</li>
<li><strong>CVC</strong> (circulation veineuse collaterale) : signe d'HTP</li>
<li><strong>Aspect en obusier / besace / batracien :</strong> ascite</li>
</ul>`},

{title:"Palpation de l'Abdomen",icon:"fa-hand",
   content:`<div class="sub-title">Regle generales</div>
<ul class="content-text">
<li>Mains rechauffees, palpation douce et progressive (superficiel → profond)</li>
<li>Commencer par region non douloureuse, progresser vers zone douloureuse</li>
</ul>
<div class="sub-title">Modification du tonus parietal</div>
<table class="clinical-table">
<thead><tr><th>Signe</th><th>Description</th><th>Signification</th></tr></thead>
<tbody>
<tr><td>Defense</td><td>Contraction douloureuse declenchee par la palpation</td><td>Irritation peritoneale</td></tr>
<tr><td><strong>Contracture</strong></td><td>Rigidite involontaire, douloureuse, persistante « ventre de bois »</td><td><span class="key-point">Peritonite</span></td></tr>
</tbody></table>
<div class="sub-title">Points douloureux specifiques</div>
<ul class="content-text">
<li><strong>Point appendiculaire :</strong> valeur que si associe aux autres signes</li>
<li><strong>Manoeuvre de Murphy :</strong> palpation profonde sous rebord costal D + inspiration profonde. Positif si douleur empeche de terminer inspiration → cholécystite</li>
<li><strong>Douleur a la decompression</strong> (Blomberg) : signe d'irritation peritoneale</li>
</ul>
<div class="sub-title">Palpation des orifices herniaires</div>
<p class="content-text"><span class="key-point">Systematique.</span> Faire tousser le malade. Hernie = tuméfaction molle, impulsive a la toux, reductible.</p>
<ul class="content-text">
<li><strong>Hernie ventrale :</strong> sur points faibles (cicatrices, ombilic, ligne blanche). Diastasis grands droits (multipares)</li>
<li><strong>Hernie inguinale :</strong> la plus frequente. Rechercher debout, cuisse flechie, petit doigt dans anneau inguinal externe</li>
<li><strong>Hernie crurale :</strong> sous arcade crurale, triangle femoral</li>
</ul>`},

{title:"Percussion et Auscultation",icon:"fa-ear-listen",
   content:`<div class="sub-title">Percussion</div>
<ul class="content-text">
<li><strong>Matites physiologiques :</strong> hepatique (base grill costal → dernieres cotes flottantes), sus-pubienne (vessie pleine)</li>
<li><strong>Disparition de la matite hepatique :</strong> perforation d'ulcere (pneumoperitoine)</li>
<li><strong>Matite anormale :</strong></li>
</ul>
<table class="clinical-table">
<thead><tr><th>Matite</th><th>Limite superieure</th><th>Sensibilite</th></tr></thead>
<tbody>
<tr><td><strong>Ascite</strong></td><td>Concave vers le haut, mobile</td><td>Non sensible</td></tr>
<tr><td><strong>Globe vesical</strong></td><td>Convexe vers le haut</td><td>Tres sensible</td></tr>
</tbody></table>
<div class="sub-title">Auscultation</div>
<p class="content-text">Bruits hydro-aeriques : gargouillis correspondant au transit intestinal normal. Augmentes si peristaltisme rapide. <strong>Abolis</strong> en cas d'occlusion intestinale ou ileus reflechi.</p>`},

{title:"Toucher Rectal",icon:"fa-hand-point-up",
   content:`<div class="callout warn"><div class="callout-icon"><i class="fas fa-comment-medical"></i></div><div>Expliquer le geste au patient avant de le realiser. Positions : decubitus dorsal (jambes flechies, poings sous fesses), genu-pectorale, decubitus lateral, position gynecologique.</div></div>
<div class="sub-title">Etude</div>
<ul class="content-text">
<li><strong>Tonus du sphincter anal</strong></li>
<li><strong>Paroi rectale</strong> : lisse et souple ? (effort de poussee pour mieux examiner)</li>
<li><strong>Contenu intra-rectal :</strong> matieres (fecalome), tumeur, stenose</li>
<li><strong>Cul de sac de Douglas :</strong> comblement ? douleur ?</li>
<li><strong>Prostate (homme) :</strong> 2 lobes reguliers et souples, separes par sillon median</li>
<li><strong>Organes pelviens (femme) :</strong> masse uterine/ovarienne, cloison recto-vaginale</li>
</ul>
<div class="callout info"><div class="callout-icon"><i class="fas fa-magnifying-glass"></i></div><div><strong>Ne pas jeter trop vite le doigtier !</strong> Examiner : sang rouge (rectorragie) ou noir (méléna), couleur des selles, glaires ou pus.</div></div>`}
]},

/* 4 */ {
  id:"urgences", num:"04", title:"Urgences Chirurgicales Abdominales", icon:"fa-kit-medical",
  color:"#ef4444", tags:[{t:"Urgence vitale",c:"urgent"},{t:"Clinique",c:"clinic"},{t:"Imagerie",c:"bio"}],
  desc:"Appendicite aigue, occlusion intestinale aigue et peritonites aigues generalisees — les trois grandes urgences abdominales.",
  sections:[
  {title:"Appendicite Aigue",icon:"fa-virus",
   content:`<p class="content-text"><strong>Definition :</strong> Inflammation et/ou infection de l'appendice caecal. 1ere urgence chirurgicale abdominale, touche les 2 sexes a tout age.</p>
<div class="callout info"><div class="callout-icon"><i class="fas fa-lightbulb"></i></div><div>Polymorphisme clinique frequent. Diagnostic facilite par l'echographie et la TDM.</div></div>
<div class="sub-title">Forme habituelle : Appendicite iliaque droite</div>
<div class="sub-sub-title">Signes fonctionnels</div>
<ul class="content-text">
<li><strong>Douleur FID</strong> : brutale, continue, intensite variable. Point de depart epigastrique/peri-ombilical puis migration FID (signe de Mac Burney)</li>
<li><strong>Vomissements</strong> : alimentaires ou nausées</li>
<li><strong>Troubles du transit</strong> : constipation</li>
</ul>
<div class="sub-sub-title">Signes generaux</div>
<ul class="content-text"><li>Temperature moderee : 38 – 38,5 C avec pouls accelere</li></ul>
<div class="sub-sub-title">Signes physiques</div>
<ul class="content-text">
<li><strong>Point de Mac Burney</strong> : douleur a la pression a la jonction 1/3 ext - 2/3 int de la ligne ombilic-EIAS</li>
<li><strong>Signe de Blomberg</strong> : douleur FID a la decompression brutale (irritation peritonéale)</li>
<li><strong>Signe de Rovsing</strong> : douleur FID a la depression brutale de la FIG</li>
<li><strong>Defense parietale</strong> : temoin de l'irritation peritonéale — signe important</li>
<li><strong>Toucher pelvien (TR/TV)</strong> : douleur vive a droite</li>
</ul>
<div class="sub-sub-title">Examens complementaires</div>
<table class="clinical-table">
<thead><tr><th>Examen</th><th>Resultats</th></tr></thead>
<tbody>
<tr><td>FNS</td><td>Normale dans 50%. Parfois hyperleucocytose a neutrophiles</td></tr>
<tr><td>Echographie</td><td>Appendice > 6mm, image en cocarde, densification graisse peri-appendiculaire, stercolithe. Indispensable chez la femme (DD annexielle)</td></tr>
<tr><td>TDM</td><td>Diagnostic positif et differentiel (pathologies annexielles)</td></tr>
</tbody></table>
<div class="sub-sub-title">Formes cliniques</div>
<table class="clinical-table">
<thead><tr><th>Forme</th><th>Siege</th><th>Clinique</th></tr></thead>
<tbody>
<tr><td>Retro-caecale</td><td>Derriere le caecum</td><td>Douleur lombaire, psoitis (flexion cuisse, extension douloureuse)</td></tr>
<tr><td>Pelvienne</td><td>Contact vessie/rectum</td><td>Douleur pelvienne, constipation, tenesme, epreinte, pollakiurie</td></tr>
<tr><td>Sous-hepatique</td><td>Sous le foie</td><td>Douleur HCD simulant cholécystite aigue</td></tr>
<tr><td>Meso-celialique</td><td>Entre les anses</td><td>Occlusion intestinale aigue febrile</td></tr>
</tbody></table>
<div class="callout danger"><div class="callout-icon"><i class="fas fa-triangle-exclamation"></i></div><div><strong>Complications :</strong> Le Plastron appendiculaire, l'Abces appendiculaire, la Peritonite. La defense parietale impose l'intervention chirurgicale en urgence.</div></div>`},

{title:"Occlusion Intestinale Aigue",icon:"fa-circle-xmark",
   content:`<p class="content-text"><strong>Definition :</strong> Arret complet et permanent du transit intestinal. Vraie urgence chirurgicale, mortelle hors traitement en urgence.</p>
<div class="sub-title">Physiopathologie</div>
<p class="content-text">Un obstacle provoque un hyper-peristaltisme en amont → douleurs abdominales.</p>
<div class="sub-sub-title">Consequences locales</div>
<ul class="content-text">
<li><strong>Distension</strong> en amont → 3eme secteur (eau, electrolytes, nutriments) → hypovolemie, choc, deshydratation, insuffisance renale</li>
<li><strong>Hyperpression endoluminale</strong> → hypoperfusion → ischemie → necrose → perforation diastatique → peritonite</li>
</ul>
<div class="sub-sub-title">Consequences generales</div>
<p class="content-text">Hypovolemie → tachycardie → hypotension → systeme renine-angiotensine → vasconstriction, retention hydrosodee, oligurie → anurie → insuffisance renale. Atteinte multi-viscerale → deces.</p>
<div class="sub-title">Mecanismes</div>
<table class="clinical-table">
<thead><tr><th>Type</th><th>Mecanisme</th><th>Exemples</th></tr></thead>
<tbody>
<tr><td rowspan="3"><span class="key-point">Strangulation</span></td><td>Volvulus</td><td>Torsion d'anse sur axe vasculaire</td></tr>
<tr><td>Hernie etranglée</td><td>Hernie inguinale strangulee</td></tr>
<tr><td>Brides post-operatoires</td><td>Adherences, invagination intestinale</td></tr>
<tr><td rowspan="2"><span class="key-point">Obstruction</span></td><td>Stenose endoluminale</td><td>Cancer colon/rectum, Crohn</td></tr>
<tr><td>Fecalome / corps etranger</td><td>Obstruction mecanique simple</td></tr>
</tbody></table>
<div class="sub-title">Clinique</div>
<ul class="content-text">
<li><strong>SF :</strong> douleurs paroxystiques (coliques), vomissements (alimentaires → bilieux → fecaloides), arret matieres et gaz (signe capital)</li>
<li><strong>SG :</strong> TA effondree, T° normale au debut, etat de choc, pouls accelere</li>
<li><strong>SP :</strong> ballonnement, cicatrice/hernie, sensation elastique, defense/contracture, tympanisme, silence auscultatoire, TR</li>
</ul>
<div class="callout warn"><div class="callout-icon"><i class="fas fa-hand-point-up"></i></div><div><strong>2 gestes imperatifs :</strong> examen des orifices herniaires ET toucher rectal.</div></div>
<div class="sub-title">Examens complementaires</div>
<p class="content-text"><strong>ASP :</strong> images hydro-aeriques pathognomoniques. Grelique : centrales, plus larges que hautes. Colique : peripheriques, plus hautes que larges.</p>
<p class="content-text"><span class="key-point">TDM indispensable :</span> diagnostic positif, etiologique, topographique, de gravite et decisionnel therapeutique.</p>`},

{title:"Peritonites Aigues Generalisees",icon:"fa-biohazard",
   content:`<p class="content-text"><strong>Definition :</strong> Inflammation et/ou infection de la serreuse peritoneale. Vraie urgence chirurgicale, pronostic vital en jeu.</p>
<div class="sub-title">Mecanisme</div>
<p class="content-text">Contamination par perforation d'un organe creux. Plus rarement : peritonite primitive (pneumocoque enfant, pelviperitonite femme) → traitement medical.</p>
<div class="sub-title">Clinique commune</div>
<ul class="content-text">
<li><strong>SF :</strong> douleur ABD generalisee (d'abord localisee puis diffusee), continue, intense, aggravée par toux/eternuement/defecation. Le siege initial est capital pour l'etiologie (FIDte → appendiculaire, epigastrique → ulcere G-D)</li>
<li><strong>SG :</strong> T° 39-40 C, pouls accelere, AEG, TA effondree, etat de choc</li>
<li><strong>SP :</strong> abdomen contracté/immobile, <span class="key-point">contracture ABD « ventre de bois »</span>, reflexes cutaneo-abdominaux abolis, TR douloureux (cri de Douglas)</li>
</ul>
<div class="callout danger"><div class="callout-icon"><i class="fas fa-skull-crossbones"></i></div><div><strong>La contracture ABD impose l'intervention chirurgicale en urgence.</strong></div></div>
<div class="sub-title">Formes cliniques</div>
<div class="sub-sub-title">Peritonite appendiculaire</div>
<ul class="content-text"><li>Douleur initiale FIDte, contracture max FIDte, T° d'emblee, hyperleucocytose. Echo/TDM : epanchement purulent intra-ABD</li></ul>
<div class="sub-sub-title">Peritonite par perforation d'ulcere G-D</div>
<ul class="content-text">
<li>Douleur brutale en coup de poignard epigastrique puis generalisee. Le malade precise toujours l'heure de debut</li>
<li>ATCD d'ulcere. T° normale (chimique) puis T° apres 6H (septique)</li>
<li><strong>Disparition matite pre-hepatique</strong> en demi-assise → pneumoperitoine</li>
<li><strong>ASP debut :</strong> croissant gazeux inter-hepato-diaphragmatique = signe pathognomonique</li>
</ul>
<div class="quiz-card" data-quiz="perito">
<div class="quiz-q">Quel signe radiologique est pathognomonique d'une perforation d'organe creux ?</div>
<button class="quiz-option" data-correct="false">Images hydro-aeriques de l'occlusion</button>
<button class="quiz-option" data-correct="false">Niveaux hydro-aeriques en cadre</button>
<button class="quiz-option" data-correct="true">Croissant gazeux inter-hepato-diaphragmatique</button>
<button class="quiz-option" data-correct="false">Stercolite visible a l'ASP</button>
<div class="quiz-feedback"></div>
</div>`}
]},

/* 5 */ {
  id:"ascites", num:"05", title:"Les Ascites", icon:"fa-droplet",
  color:"#3b82f6", tags:[{t:"Clinique",c:"clinic"},{t:"Physiopathologie",c:"bio"},{t:"Ponction",c:"bio"}],
  desc:"Epanchement liquidien dans la cavite peritoneale. Transsudat vs exsudat, diagnostic positif et etiologique.",
  sections:[
  {title:"Definition et Physiologie",icon:"fa-droplet",
   content:`<p class="content-text"><strong>Definition :</strong> Presence d'un epanchement liquidien dans la cavite peritoneale. Le plus souvent jaune citrin, peut etre vert (bile), hematique (carcinose), chyleux (obstruction canal thoracique). Libre ou cloisonnee.</p>
<div class="callout warn"><div class="callout-icon"><i class="fas fa-circle-exclamation"></i></div><div><strong>Ne sont PAS des ascites :</strong> Un hemoperitoine (sang pur) et une peritonite (pus pur).</div></div>
<div class="sub-title">Loi de Starling</div>
<p class="content-text">Le liquide se dirige d'un milieu a pression hydrostatique elevee vers un milieu a pression basse, et d'un milieu a pression oncotique basse vers un milieu a pression oncotique elevee.</p>
<p class="content-text">Le liquide peritoneal provient du milieu interstitiel hepatique, traverse les capillaires sinusoïdes, est deverse par la capsule de Glisson. Riche en protides, reabsorbe par les lymphatiques sous-peritoneaux (sous-diaphragmatiques). Capacite de resorption <strong>limitee a 600 ml</strong>.</p>
<div class="sub-title">Transsudat vs Exsudat</div>
<table class="clinical-table">
<thead><tr><th>Caractere</th><th>Transsudat</th><th>Exsudat</th></tr></thead>
<tbody>
<tr><td>Mecanisme</td><td>Mecanique, non inflammatoire (stase)</td><td>Inflammatoire (perméabilite modifiee)</td></tr>
<tr><td>Proteines</td><td>&lt; 30 g/L — pauvre</td><td>&gt; 30 g/L — riche</td></tr>
<tr><td>Rivalta</td><td>Negatif</td><td>Positif</td></tr>
<tr><td>Leucocytes</td><td>Pauvre</td><td>Riche</td></tr>
<tr><td>Exemples</td><td>IC, IR, HTP, syndrome nephrotique</td><td>Tuberculose, carcinose peritoneale</td></tr>
</tbody></table>`},

{title:"Etude Semio-logique",icon:"fa-stethoscope",
   content:`<div class="sub-title">Ascite de moyenne abondance</div>
<div class="sub-sub-title">Signes fonctionnels</div>
<p class="content-text">Discrets : augmentation volume abdominal, desserrage ceinture, pression/tiraillement flancs, DLR lombaires.</p>
<div class="sub-sub-title">Signes physiques</div>
<ul class="content-text">
<li><strong>Inspection :</strong> ABD augmente. « En obusier » (recente, rapide) ou « en besace » (ancienne, lente). « Ventre de batracien ». Ombilic +/- deplisse, peau tendue/aminicie/luisante. CVC recherchee</li>
<li><strong>Percussion :</strong> <span class="key-point">matite sous-ombilicale</span> franche, hydrique, declive, limite superieure concave vers le haut, mobile. Sonorite peri-ombilicale</li>
</ul>
<div class="callout info"><div class="callout-icon"><i class="fas fa-check-double"></i></div><div><strong>Au total l'ascite est :</strong> Declive — Mobile — Concave vers le haut — Avec tympanisme peri-ombilical</div></div>
<ul class="content-text">
<li><strong>Palpation :</strong> signe de Glaçon (foie/rate/masse a travers l'ascite), signe de flot (ascite libre)</li>
<li><strong>Touchers pelviens :</strong> culs de sac bombes/renitents, utérus abaisse (femme)</li>
</ul>
<div class="sub-title">Ascite de grande abondance</div>
<ul class="content-text">
<li>SF tres marques : dyspnee, palpitations, constipation, oligurie</li>
<li>ABD enorme, ombilic « doigt de gant », vergetures, oedèmes MI/genitaux/CVC par compression VCI</li>
<li>Matite tout l'ABD, pas de signe de flot ni Glaçon</li>
<li><span class="key-point">CAT urgence :</span> ponction evacuatrice lente et prudente</li>
</ul>
<div class="sub-title">Ascite de petite abondance</div>
<p class="content-text">Diagnostic difficile. Inspection/palpation negatives. Matite declive/mobile dans flancs. Diagnostic par ponction exploratrice et echographie.</p>`},

{title:"Diagnostic Etiologique",icon:"fa-magnifying-glass",
   content:`<div class="sub-title">Ascites inflammatoires (exsudat)</div>
<ul class="content-text">
<li><strong>Tuberculeuse :</strong> cytologie lymphocytaire, laparoscopie (granulations blanchatres + biopsies)</li>
<li><strong>Cancereuse (carcinose) :</strong> cellules malignes, nodules metastatiques de taille differente + biopsies</li>
</ul>
<div class="sub-title">Ascites mecaniques (transsudat)</div>
<p class="content-text">Associees a oedèmes MI = <strong>syndrome oedemato-ascitique</strong> (sauf HTP isolée).</p>
<table class="clinical-table">
<thead><tr><th>Cause</th><th>Mecanisme</th></tr></thead>
<tbody>
<tr><td>Cirrhose (HTP)</td><td>Augmentation pression systeme porte</td></tr>
<tr><td>IR / Syndrome nephrotique</td><td>Hypoalbuminemie</td></tr>
<tr><td>Insuffisance cardiaque</td><td>Stase, augmentation pression hydrostatique</td></tr>
</tbody></table>
<div class="callout neutral"><div class="callout-icon"><i class="fas fa-list-check"></i></div><div><strong>Ascites les plus frequentes :</strong> Cirrhotiques > Cancereuses > Tuberculeuses > Cardiaques > Syndrome nephrotique</div></div>
<div class="sub-title">Diagnostics differentiels</div>
<table class="clinical-table">
<thead><tr><th>Pathologie</th><th>Cle du diagnostic</th></tr></thead>
<tbody>
<tr><td>Obesite</td><td>ABD uniforme, ombilic enfoui, tissu adipeux generalise</td></tr>
<tr><td>Meteorisme</td><td>Tympanisme (pas de matite)</td></tr>
<tr><td>Globe vesical</td><td>Matite sensible, limite superieure convexe vers le BAS</td></tr>
<tr><td>Gros kyste ovaire</td><td>Matite mediane, pas de deplissement ombilical, sonorite lombaire, signe de la regle +</td></tr>
</tbody></table>`}
]},

/* 6 */ {
  id:"icteres", num:"06", title:"Les Icteres", icon:"fa-eye",
  color:"#eab308", tags:[{t:"Clinique",c:"clinic"},{t:"Biologie",c:"bio"},{t:"Imagerie",c:"bio"}],
  desc:"Coloration jaune a bronze des tissus liee au depot de bilirubine. Icteres a bilirubine conjuguee vs non conjuguee.",
  sections:[
  {title:"Definition et Metabolisme",icon:"fa-circle-info",
   content:`<p class="content-text"><strong>Definition :</strong> Coloration jaune a bronze des tissus par depot de bilirubine secondaire a une hyperbilirubinemie.</p>
<ul class="content-text">
<li>Bilirubinemie normale : &lt; 20 μmol/L</li>
<li>Ictere conjonctival : bilirubinemie > 30 μmol/L</li>
</ul>
<table class="clinical-table">
<thead><tr><th>Intensite</th><th>Taux bilirubine</th></tr></thead>
<tbody>
<tr><td>Sub-ictere</td><td>15 - 30 mg/L</td></tr>
<tr><td>Ictere franc</td><td>> 30 mg/L</td></tr>
<tr><td>Ictere intense (bronze florentin)</td><td>300 - 400 mg/L</td></tr>
</tbody></table>
<div class="sub-title">Diagnostics differentiels (pieges)</div>
<ul class="content-text">
<li>Paleur des anemies</li>
<li>Carotenodermie (carotene) — <strong>conjonctives NORMALES</strong></li>
<li>Quinacrine, phenols — <strong>bilirubinemie CORRECTE</strong></li>
</ul>
<div class="callout info"><div class="callout-icon"><i class="fas fa-lightbulb"></i></div><div>Toujours examiner les conjonctives. Carotenodermie : conjonctives normales + bilirubinemie correcte.</div></div>`},

{title:"Ictere a Bilirubine Non Conjuguee (BNC)",icon:"fa-droplet-slash",
   content:`<p class="content-text"><strong>Caracteristiques :</strong> Urines normales, bilan hepatique normal.</p>
<div class="sub-sub-title">Ictere hemolytique chronique</div>
<ul class="content-text"><li>Sub-ictere, selles foncées, urines claires, pas de prurit, splenomegalie. Brb indirecte < 50 mg, anemie, reticulocytes augmentes</li></ul>
<div class="sub-sub-title">Ictere hemolytique aigu</div>
<ul class="content-text"><li>Douleur lombaire, fievre, oligurie, urines rouge porto, choc. Ex : erreur transfusionnelle, deficit G6PD (favisme)</li></ul>
<div class="sub-sub-title">Maladie de Gilbert</div>
<ul class="content-text"><li>Benigne, frequente, autosomique recessive. S'exprime lors de jeune, infection, medicaments. Pas d'hemolyse, tests normaux</li></ul>
<div class="sub-sub-title">Syndrome de Crigler-Najjar</div>
<ul class="content-text"><li>Grave, rare. Ictere + encephalopathie bilirubinemique. Deces sans transplantation hepatique</li></ul>`},

{title:"Ictere a Bilirubine Conjuguee (BC) — Cholestase",icon:"fa-droplet",
   content:`<p class="content-text"><strong>Caracteristiques :</strong> Urines foncées mousseuses, selles decolorees, tests hepatiques perturbés.</p>
<div class="sub-sub-title">Cholestase intra-hepatique</div>
<table class="clinical-table">
<thead><tr><th>Etiologie</th><th>Cles du diagnostic</th></tr></thead>
<tbody>
<tr><td>Cirrhose</td><td>Foie cirrhotique, signes HTP, Brb mixte/directe</td></tr>
<tr><td>Hepatite virale aigue (A,B,C,E)</td><td>Phase pre-icterique grippale, triade de Caroli, cytolyse</td></tr>
<tr><td>Hepatite auto-immune</td><td>Femme jeune, terrain auto-immun</td></tr>
<tr><td>Hepatite medicamenteuse</td><td>Interrogatoire medicamenteux</td></tr>
</tbody></table>
<div class="sub-sub-title">Cholestase extra-hepatique</div>
<div class="callout danger"><div class="callout-icon"><i class="fas fa-bolt"></i></div><div><strong>Syndrome cholédocien / Angiocholite = URGENCE THERAPEUTIQUE</strong> — Douleur + Fievre 40C (frissons) + Ictere progressif fluctuant (24-48h). Choc septique possible.</div></div>
<table class="clinical-table">
<thead><tr><th>Cause</th><th>Clinique</th></tr></thead>
<tbody>
<tr><td>Lithiase VBP</td><td>Angiocholite (douleur + fievre + ictere)</td></tr>
<tr><td>Cancer du pancreas</td><td>Ictere « nu » (sans douleur ni fievre), prurit feroce, AEG</td></tr>
<tr><td>Ampullome vatérien</td><td>Ictere + méléna (anemie deperditionnelle)</td></tr>
<tr><td>Cholangiocarcinome</td><td>Ictere cholestatique, AEG</td></tr>
</tbody></table>
<div class="sub-title">Explorations morphologiques</div>
<table class="clinical-table">
<thead><tr><th>Examen</th><th>Interet</th></tr></thead>
<tbody>
<tr><td>Echographie</td><td>1er examen. Dilatation VBP? Anomalies parenchyme? Nature obstacle?</td></tr>
<tr><td>TDM</td><td>Plus specifique/sensible. Lithiase VBP, tumeurs, pancreas</td></tr>
<tr><td>Bili-IRM</td><td>Tres bonne visualisation voies biliaires. Peu invasif</td></tr>
<tr><td>Echo-endoscopie</td><td>Invasif (AG). Microcalculs, petite lesion tete pancreas, ponctions guidees</td></tr>
</tbody></table>`}
]},

/* 7 */ {
  id:"anemies", num:"07", title:"Semio-logie des Anemies", icon:"fa-tint",
  color:"#dc2626", tags:[{t:"Clinique",c:"clinic"},{t:"Biologie",c:"bio"}],
  desc:"Signe biologique frequent et non une maladie. Evaluation du retentissement clinique et analyse de l'hemogramme.",
  sections:[
  {title:"Generalites et Physiologie",icon:"fa-flask",
   content:`<p class="content-text"><strong>Definition :</strong> Diminution de la concentration d'hemoglobine circulante, pouvant s'accompagner d'une baisse des GR et de l'hematocrite.</p>
<div class="sub-sub-title">Normales hematologiques</div>
<table class="clinical-table">
<thead><tr><th>Parametre</th><th>Femme</th><th>Homme</th></tr></thead>
<tbody>
<tr><td>GR (millions/mm3)</td><td>4 - 5,5</td><td>4,5 - 5,5</td></tr>
<tr><td>Hematocrite (%)</td><td>38 - 47</td><td>42 - 54</td></tr>
<tr><td>Hemoglobine (g/100ml)</td><td>12 - 16</td><td>14 - 18</td></tr>
</tbody></table>
<div class="sub-title">Indices erythrocytaires</div>
<table class="clinical-table">
<thead><tr><th>Indice</th><th>Formule</th><th>Normale</th></tr></thead>
<tbody>
<tr><td>VGM (fl)</td><td>Hte / GR × 10</td><td>80 - 95</td></tr>
<tr><td>CCMH (%)</td><td>Hb / Hte × 100</td><td>32 - 36</td></tr>
</tbody></table>
<div class="sub-title">Physiopathologie — 3 mecanismes</div>
<ul class="content-text">
<li><strong>1. Hemolyse pathologique</strong> : corpusculaire (membrane, enzymes, Hb) ou extra-corpusculaire → <span class="key-point">regenerative</span></li>
<li><strong>2. Perte excesive</strong> (hemorragie) : moelle normale → hyperréticulocytose = <span class="key-point">regenerative</span></li>
<li><strong>3. Insuffisance de production</strong> : carence (fer, B12, B9), anomalie EPO, invasion medullaire → <span class="key-point">aregenerative</span></li>
</ul>`},

{title:"Etude Clinique",icon:"fa-stethoscope",
   content:`<div class="sub-title">Syndrome anemique chronique — 4 signes fondamentaux</div>
<div class="sub-sub-title">1. Paleur cutaneo-muqueuse</div>
<ul class="content-text">
<li>Signe majeur mais inconstant, peut etre masquee (ictere, hyperpigmentation)</li>
<li>Conjonctives plus fiables. Rechercher : lit ungueal, levres, gencives, paume des mains</li>
</ul>
<div class="sub-sub-title">2. Signes cardio-pulmonaires</div>
<ul class="content-text">
<li>Fonctionnels : palpitations, dyspnee d'effort puis repos, angor</li>
<li>Physiques : tachycardie, souffle systolique fonctionnel</li>
<li><strong>Gravite :</strong> insuffisance cardiaque, oedèmes MI</li>
</ul>
<div class="sub-sub-title">3. Signes neurosensoriels</div>
<ul class="content-text"><li>Cephalees, vertiges, lipothymie, paresthesies (B12 → syndrome cordonal postérieur)</li></ul>
<div class="sub-sub-title">4. Asthenie</div>
<div class="sub-title">Autres signes</div>
<ul class="content-text">
<li><strong>Cutanés :</strong> secheresse, phanteres anormaux (cheveux fins, ongles cassants, <strong>koilonychie</strong> → carence fer)</li>
<li><strong>Digestifs :</strong> glossite (inflammation langue, atrophie papilles, brulures, dysphagie)</li>
<li><strong>Splenomegalie :</strong> anemies hemolytiques chroniques, hemopathies malignes</li>
</ul>
<div class="callout warn"><div class="callout-icon"><i class="fas fa-triangle-exclamation"></i></div><div><strong>Anemie aigue :</strong> paleur intense, angor, agitation, polypnee, choc, decomposition cardiaque. Tolérance depend de severite, rapidite d'installation, terrain.</div></div>`},

{title:"Etiologies Principales",icon:"fa-list-ol",
   content:`<div class="sub-title">Anemies chroniques</div>
<table class="clinical-table">
<thead><tr><th>Type</th><th>Cause principale</th><th>Biologie</th><th>Signes associes</th></tr></thead>
<tbody>
<tr><td><span class="key-point">Carence martiale</span></td><td>Hemorragies genitales (F), digestives (H)</td><td>Microcytaire hypochrome, hyposideremie</td><td>Koilonychie, secheresse</td></tr>
<tr><td>Carence anti-pernicieux</td><td>B9 (grossesses), B12 (malabsorption)</td><td>Macrocytaire normochrome</td><td>Glossite, signes neuro (B12)</td></tr>
<tr><td>Hemolytique chronique</td><td>Congenitale ou acquise</td><td>Brb indirecte, reticulocytes</td><td>Triade : paleur + sub-ictère + splenomegalie</td></tr>
<tr><td>Leucemie aigue</td><td>Invasion medullaire</td><td>Frottis : cellules malignes</td><td>Paleur + fievre + hemorragies + douleurs osseuses + ADP + splenomegalie</td></tr>
</tbody></table>
<div class="sub-title">Anemies aigues (toujours peripheriques)</div>
<div class="sub-sub-title">Post-hemorragique</div>
<p class="content-text">Hemorragies digestives le plus souvent. Choc hemorragique. Hb/Hte/GR normaux pendant les premieres heures.</p>
<div class="sub-sub-title">Hemolytique aigue</div>
<p class="content-text">Accident transfusionnel (sang incompatible ABO) : douleurs lombaires, fievre, collapsus, urines rouge porto/rouge electrique (hemoglobinurie).</p>
<div class="callout danger"><div class="callout-icon"><i class="fas fa-ban"></i></div><div><strong>Ne jamais traiter une anemie sans en avoir determine la cause.</strong></div></div>`}
]},

/* 8 */ {
  id:"lympho", num:"08", title:"Semio-logie Lympho-ganglionnaire", icon:"fa-circle-nodes",
  color:"#8b5cf6", tags:[{t:"Clinique",c:"clinic"},{t:"Examen clinique",c:"clinic"}],
  desc:"Adénopathies et splénomégalies. Reconnaissance, caractérisation et orientation étiologique.",
  sections:[
  {title:"Les Adenopathies",icon:"fa-circle-nodes",
   content:`<p class="content-text"><strong>Definition :</strong> Hypertrophie ganglionnaire > 1 cm. 500-600 ganglions normalement non palpables ou micro-adenopathies (&lt;1 cm). Non pathologiques : aires inguinales (adulte), toutes aires (enfant).</p>
<div class="sub-title">Topographie des aires ganglionnaires</div>
<table class="clinical-table">
<thead><tr><th>Aire</th><th>Territoire draine</th><th>DD a connaitre</th></tr></thead>
<tbody>
<tr><td>Sous-mentonniers</td><td>Levres, gencives</td><td>—</td></tr>
<tr><td>Sous-maxillaires</td><td>Levres, gencives, joues, langue, massif facial</td><td>Lithiase sous-maxillaire</td></tr>
<tr><td>Pretragiens / parotidiens</td><td>Conjonctives, cuir chevelu, oreille moyenne</td><td>—</td></tr>
<tr><td>Sous-occipitaux</td><td>Cuir chevelu, naso-pharynx</td><td>—</td></tr>
<tr><td>Jugulo-carotidiens</td><td>Voile du palais, larynx, pharynx, amygdales</td><td>Kyste congenital, kyste thyroide, lipome</td></tr>
<tr><td><strong>Sus-claviculaire G (Troisier)</strong></td><td>Sein G, thyroide, poumon G sup, tube digestif, organes genitaux</td><td><span class="key-point">Cancer digestif ou genital</span></td></tr>
<tr><td>Axillaires</td><td>Seins, paroi thoracique, MI, paroi abdo sup</td><td>Hydrosadenite, prolongement mammaire, lipome</td></tr>
<tr><td>Inguinales (sup)</td><td>Appareil genital externe, anus</td><td>Hernie inguinale, ectopie testiculaire</td></tr>
<tr><td>Inguinales (inf)</td><td>Membre inferieur</td><td>—</td></tr>
<tr><td>Epitrochleennes</td><td>Main</td><td>—</td></tr>
</tbody></table>

/* ===== ECG ===== */
function initECG(){
  const canvas=document.getElementById('ecgCanvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');let w,h,offset=0;
  function resize(){w=canvas.width=canvas.offsetWidth;h=canvas.height=canvas.offsetHeight;}
  resize();window.addEventListener('resize',resize);
  function draw(){
    ctx.clearRect(0,0,w,h);ctx.strokeStyle='rgba(16,185,129,0.15)';ctx.lineWidth=2;ctx.beginPath();
    const mid=h*0.65;
    for(let x=0;x<w;x++){const t=(x+offset)*0.015;const c=t%(Math.PI*2);let y=mid;
      if(c>1.2&&c<1.4)y=mid-4;else if(c>1.5&&c<1.65)y=mid-40;else if(c>1.65&&c<1.8)y=mid+15;else if(c>1.8&&c<1.95)y=mid-12;else if(c>2.5&&c<2.8)y=mid-3;
      x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
    ctx.stroke();offset+=1.2;requestAnimationFrame(draw);}
  draw();
}

/* ===== CHAPITRE ===== */
function renderTopic(topicId){
  const topic=TOPICS.find(t=>t.id===topicId);if(!topic)return;
  currentTopic=topicId;openAccordions.clear();
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.topic===topicId));
  const prefix = topic.num==='TD'?'TD':'Cours '+topic.num;
  document.getElementById('breadcrumb').innerHTML=`<span>${prefix} — ${topic.title}</span>`;
  const area=document.getElementById('contentArea');
  area.innerHTML=`
    <div class="topic-header fade-in">
      <div style="display:inline-flex;align-items:center;gap:10px;margin-bottom:12px">
        <span style="font-size:.75rem;font-weight:700;padding:5px 14px;border-radius:8px;background:${topic.color}22;color:${topic.color};border:1px solid ${topic.color}33;font-family:'DM Sans',sans-serif;letter-spacing:.04em">${topic.num==='TD'?'TRAVAUX DIRIGES':'COURS '+topic.num}</span>
      </div>
      <h2>${topic.title}</h2>
      <p>${topic.desc}</p>
      <div class="topic-meta">${topic.tags.map(t=>`<span class="meta-tag ${t.c}">${t.t}</span>`).join('')}</div>
    </div>
    <div id="accordionsContainer">
      ${topic.sections.map((s,i)=>`
        <div class="accordion fade-in" data-index="${i}" style="animation-delay:${i*0.06}s">
          <div class="accordion-head" data-index="${i}">
            <div class="acc-icon"><i class="fas ${s.icon}"></i></div>
            <h3>${s.title}</h3>
            <i class="fas fa-chevron-down acc-chevron"></i>
          </div>
          <div class="accordion-body"><div class="accordion-content">${s.content}</div></div>
        </div>`).join('')}
    </div>`;
  area.querySelectorAll('.accordion-head').forEach(head=>{
    head.addEventListener('click',()=>{
      const idx=head.dataset.index;const acc=head.closest('.accordion');
      if(openAccordions.has(idx)){openAccordions.delete(idx);acc.classList.remove('open');}
      else{openAccordions.add(idx);acc.classList.add('open');}
    });
  });
  area.querySelectorAll('.quiz-card').forEach(card=>{
    card.querySelectorAll('.quiz-option').forEach(btn=>{
      btn.addEventListener('click',()=>{
        if(btn.disabled)return;const correct=btn.dataset.correct==='true';
        btn.classList.add(correct?'correct':'wrong');
        card.querySelectorAll('.quiz-option').forEach(b=>b.disabled=true);
        const fb=card.querySelector('.quiz-feedback');fb.classList.add('show',correct?'correct-fb':'wrong-fb');
        fb.textContent=correct?'Correct !':'Incorrect. Revisez la section ci-dessus.';
      });
    });
  });
  const first=area.querySelector('.accordion-head');if(first)first.click();
  window.scrollTo(0,0);
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}

/* ===== NAV ===== */
function navigateTo(topicId){
  if(topicId==='home'){currentTopic=null;renderHero();document.getElementById('breadcrumb').innerHTML='Accueil';document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));return;}
  renderTopic(topicId);
}

/* ===== SEARCH ===== */
function initSearch(){
  const overlay=document.getElementById('searchOverlay'),input=document.getElementById('searchInput'),results=document.getElementById('searchResults');
  const openSearch=()=>{overlay.classList.add('show');input.value='';results.innerHTML='<div class="search-empty">Tapez pour rechercher dans tous les chapitres</div>';setTimeout(()=>input.focus(),100);};
  const closeSearch=()=>{overlay.classList.remove('show');};
  document.getElementById('searchBtn').addEventListener('click',openSearch);
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeSearch();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSearch();if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openSearch();}});
  input.addEventListener('input',()=>{
    const q=input.value.trim().toLowerCase();if(!q){results.innerHTML='<div class="search-empty">Tapez pour rechercher dans tous les chapitres</div>';return;}
    let hits=[];
    TOPICS.forEach(topic=>{topic.sections.forEach((sec,si)=>{
      const plain=sec.content.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').toLowerCase();const idx=plain.indexOf(q);
      if(idx>-1){const s=Math.max(0,idx-60),e=Math.min(plain.length,idx+q.length+60);
        let excerpt=(s>0?'...':'')+plain.substring(s,e)+(e<plain.length?'...':'');
        excerpt=excerpt.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<mark style="background:rgba(16,185,129,.3);color:var(--primary-light);padding:0 2px;border-radius:2px">$1</mark>');
        hits.push({topic,sec,si,excerpt});}
    });});
    if(!hits.length){results.innerHTML='<div class="search-empty">Aucun resultat pour « '+input.value+' »</div>';return;}
    results.innerHTML=hits.slice(0,12).map(h=>`
      <div class="search-result-item" data-topic="${h.topic.id}" data-sec="${h.si}">
        <div class="sr-topic"><span style="font-weight:700;margin-right:4px">${h.topic.num}</span><i class="fas ${h.topic.icon}" style="margin-right:4px"></i>${h.topic.title}</div>
        <div class="sr-title">${h.sec.title}</div>
        <div class="sr-excerpt">${h.excerpt}</div>
      </div>`).join('');
    results.querySelectorAll('.search-result-item').forEach(el=>{
      el.addEventListener('click',()=>{closeSearch();navigateTo(el.dataset.topic);
        setTimeout(()=>{const acc=document.querySelector(`.accordion[data-index="${el.dataset.sec}"] .accordion-head`);
          if(acc&&!acc.closest('.accordion').classList.contains('open'))acc.click();acc?.scrollIntoView({behavior:'smooth',block:'center'});},100);
      });
    });
  });
}

/* ===== MOBILE ===== */
function initMobile(){
  const sidebar=document.getElementById('sidebar'),overlay=document.getElementById('sidebarOverlay');
  document.getElementById('hamburgerBtn').addEventListener('click',()=>{sidebar.classList.toggle('open');overlay.classList.toggle('show');});
  overlay.addEventListener('click',()=>{sidebar.classList.remove('open');overlay.classList.remove('show');});
}

/* ===== INIT ===== */
document.addEventListener('DOMContentLoaded',()=>{renderSidebar();renderHero();initSearch();initMobile();});
